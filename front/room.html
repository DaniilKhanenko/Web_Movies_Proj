<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Комната</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/catalog">Video Room</a>
      <nav>
        <a href="/catalog">Каталог</a>
        <button id="logout-button" class="secondary">Выйти</button>
      </nav>
    </header>

    <main class="content">
      <section id="join-panel" class="panel hidden">
        <h1>Вход в комнату</h1>
        <p class="muted">Введите пароль комнаты.</p>
        <form id="room-join-form">
          <label>
            Пароль комнаты
            <input id="room-password" type="password" />
          </label>
          <button type="submit">Войти</button>
        </form>
      </section>

      <section id="player-panel" class="hidden">
        <div class="room-header">
          <div>
            <p class="muted" id="room-id"></p>
            <h1 id="room-title"></h1>
          </div>
          <p id="connection-status" class="badge">offline</p>
        </div>

        <video id="video-player" controls playsinline preload="metadata"></video>
        <p id="message" class="message"></p>
      </section>
    </main>

    <script src="/static/common.js"></script>
    <script src="/static/room.js"></script>
  </body>
</html>
